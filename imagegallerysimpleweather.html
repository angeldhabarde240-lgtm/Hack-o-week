<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Weather UI</title>

<style>
/* Background */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* Title */
h1 {
    margin-top: 30px;
    font-size: 40px;
    letter-spacing: 1px;
}

/* Search Bar */
.search-box {
    margin: 25px;
}

.search-box input {
    padding: 12px 20px;
    width: 280px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(255,255,255,0.2);
}

.search-box input:focus {
    box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 30px;
    padding: 20px;
}

/* Cards */
.card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 25px;
    width: 260px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: 0.4s;
    position: relative;
    animation: float 4s ease-in-out infinite;
}

/* Floating Animation */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* Hover Effect */
.card:hover {
    transform: scale(1.08) rotate(1deg);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

/* City Name */
.city {
    font-size: 26px;
    font-weight: 600;
}

/* Icon */
.icon {
    font-size: 60px;
    margin: 10px 0;
}

/* Temperature */
.temp {
    font-size: 42px;
    font-weight: bold;
}

/* Weather Text */
.weather {
    font-size: 18px;
    opacity: 0.9;
}

/* Extra Info */
.details {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
}

/* Footer */
footer {
    margin-top: 30px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<h1>🌤️ Smart Weather Panel</h1>

<div class="search-box">
    <input type="text" id="search" placeholder="Search city..." onkeyup="filterCities()">
</div>

<div class="container">

    <!-- Pune -->
    <div class="card" data-city="pune">
        <div class="city">Pune</div>
        <div class="icon">☀️</div>
        <div class="temp">32°C</div>
        <div class="weather">Sunny</div>
        <div class="details">Humidity: 40% | Wind: 10 km/h</div>
    </div>

    <!-- Mumbai -->
    <div class="card" data-city="mumbai">
        <div class="city">Mumbai</div>
        <div class="icon">🌧️</div>
        <div class="temp">28°C</div>
        <div class="weather">Rainy</div>
        <div class="details">Humidity: 80% | Wind: 15 km/h</div>
    </div>

    <!-- Delhi -->
    <div class="card" data-city="delhi">
        <div class="city">Delhi</div>
        <div class="icon">🌫️</div>
        <div class="temp">30°C</div>
        <div class="weather">Foggy</div>
        <div class="details">Humidity: 60% | Wind: 8 km/h</div>
    </div>

</div>

<footer>
✨ Designed with Glassmorphism • Static Weather UI
</footer>

<script>
function filterCities() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let city = card.getAttribute("data-city");
        card.style.display = city.includes(input) ? "block" : "none";
    });
}
</script>

</body>
</html>
